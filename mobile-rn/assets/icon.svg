<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="42%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="512" y1="64" x2="512" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="letter" x1="512" y1="248" x2="512" y2="792" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="letterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0c1a44" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#sheen)"/>

  <!-- subtle inner ring -->
  <rect x="56" y="56" width="912" height="912" rx="192" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

  <!-- modern geometric A -->
  <g filter="url(#letterShadow)">
    <path
      fill="url(#letter)"
      d="M512 248 L748 792 H658 L606 668 H418 L366 792 H276 L512 248 Z
         M448 584 H576 L512 404 Z"
    />
  </g>

  <!-- accent dash -->
  <rect x="392" y="836" width="240" height="10" rx="5" fill="#ffffff" fill-opacity="0.42"/>
</svg>
