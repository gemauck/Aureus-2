    <!-- Early theme boot: CRITICAL - Never apply dark mode when user wants light mode -->
    <script>
        (function() {
            try {
                var root = document.documentElement;
                var storedTheme = localStorage.getItem('abcotronics_theme');
                var useSystemTheme = localStorage.getItem('abcotronics_use_system_theme') === 'true';
                
                // CRITICAL: If user explicitly chose light mode and is NOT following system,
                // NEVER apply dark mode - force light mode always
                if (!useSystemTheme && storedTheme === 'light') {
                    root.classList.remove('light','dark');
                    root.classList.add('light');
                    localStorage.setItem('abcotronics_theme', 'light');
                    localStorage.setItem('abcotronics_use_system_theme', 'false');
                    return;
                }
                
                // If following system, check system preference
                if (useSystemTheme) {
                    var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    var themeToApply = systemPrefersDark ? 'dark' : 'light';
                    root.classList.remove('light','dark');
                    root.classList.add(themeToApply);
                    localStorage.setItem('abcotronics_theme', themeToApply);
                    return;
                }
                
                // Default: light mode (first time user or no preference)
                var themeToApply = (storedTheme === 'dark') ? 'dark' : 'light';
                root.classList.remove('light','dark');
                root.classList.add(themeToApply);
                localStorage.setItem('abcotronics_theme', themeToApply);
                localStorage.setItem('abcotronics_use_system_theme', 'false');
            } catch (e) {}
        })();
    </script>

    <!-- Stale HTML check: if server has a newer build, force reload so Chrome gets fresh JS (fixes cached bundle) -->
    <script>
        (function() {
            var embedVersion = window.BUILD_VERSION;
            if (!embedVersion) return;
            fetch('/dist/build-version.json?t=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(data) {
                    if (data && data.version && String(data.version) !== String(embedVersion)) {
                        var params = new URLSearchParams(location.search || '');
                        params.delete('_purge');
                        params.set('_purge', String(Date.now()));
                        var q = params.toString();
                        location.replace(location.pathname + (q ? '?' + q : '') + (location.hash || ''));
                    }
                })
                .catch(function() {});
        })();
    </script>
    
    <!-- Cache Clearing Script - Runs early to clear stale cache -->
    <!-- VERSION: 20260129-doc-collection-cache-bust - Update when deploying -->
    <script>
        (function() {
            var APP_VERSION = '1774266888162';
            var VERSION_STORAGE_KEY = 'abcotronics_app_html_version';
            
            try {
                // Check stored version vs current version
                var storedVersion = localStorage.getItem(VERSION_STORAGE_KEY);
                var versionMismatch = storedVersion !== APP_VERSION;
                
                // Check if we need to force clear cache (via URL parameter or localStorage flag or version mismatch)
                var urlParams = new URLSearchParams(window.location.search);
                var hashParams = new URLSearchParams((window.location.hash || '').split('?')[1] || '');
                var shouldClearCache = urlParams.has('clearCache') || 
                                      urlParams.has('forceRefresh') || 
                                      hashParams.has('clearCache') || 
                                      hashParams.has('forceRefresh') ||
                                      localStorage.getItem('abcotronics_force_clear_cache') === 'true' ||
                                      versionMismatch;
                
                if (shouldClearCache || versionMismatch) {
                    console.log('🧹 Force clearing cache on page load...');
                    console.log('📦 Version check: stored=' + storedVersion + ', current=' + APP_VERSION);
                    
                    // Clear all localStorage cache related to clients/leads/groups
                    try {
                        var keysToRemove = [];
                        for (var i = 0; i < localStorage.length; i++) {
                            var key = localStorage.key(i);
                            if (key && (
                                key.includes('clients') || 
                                key.includes('leads') || 
                                key.includes('groups') ||
                                key.includes('cache') ||
                                key.includes('Client') ||
                                key.includes('Lead') ||
                                key.includes('Group') ||
                                key.startsWith('abcotronics_') ||
                                key.startsWith('app_')
                            )) {
                                keysToRemove.push(key);
                            }
                        }
                        keysToRemove.forEach(function(key) {
                            localStorage.removeItem(key);
                            console.log('🗑️ Cleared localStorage key:', key);
                        });
                    } catch (e) {
                        console.warn('Could not clear localStorage:', e);
                    }
                    
                    // Clear sessionStorage
                    try {
                        sessionStorage.clear();
                        console.log('🗑️ Cleared sessionStorage');
                    } catch (e) {
                        console.warn('Could not clear sessionStorage:', e);
                    }
                    
                    // Clear IndexedDB if available (for advanced caching)
                    if ('indexedDB' in window) {
                        try {
                            indexedDB.databases().then(function(databases) {
                                databases.forEach(function(db) {
                                    if (db.name && (db.name.includes('cache') || db.name.includes('abcotronics'))) {
                                        indexedDB.deleteDatabase(db.name);
                                        console.log('🗑️ Cleared IndexedDB:', db.name);
                                    }
                                });
                            }).catch(function(e) {
                                console.warn('Could not clear IndexedDB:', e);
                            });
                        } catch (e) {
                            console.warn('IndexedDB not available:', e);
                        }
                    }
                    
                    // Set a flag for when DatabaseAPI loads to clear its cache
                    window.__CLEAR_DATABASE_CACHE_ON_LOAD__ = true;
                    window.__FORCE_REFRESH_DATA__ = true;
                    
                    // Update stored version
                    localStorage.setItem(VERSION_STORAGE_KEY, APP_VERSION);
                    
                    // Remove refresh parameters from URL
                    if (urlParams.has('clearCache') || urlParams.has('forceRefresh')) {
                        urlParams.delete('clearCache');
                        urlParams.delete('forceRefresh');
                        var newSearch = urlParams.toString();
                        var newUrl = window.location.pathname + (newSearch ? '?' + newSearch : '') + window.location.hash;
                        window.history.replaceState({}, '', newUrl);
                    }
                    
                    console.log('✅ Cache cleared and version updated to:', APP_VERSION);
                    
                    // If version mismatch, force a hard reload to get fresh HTML
                    if (versionMismatch && !urlParams.has('noReload')) {
                        console.log('🔄 Version mismatch detected - forcing hard reload to get fresh HTML');
                        console.log('   Old version:', storedVersion);
                        console.log('   New version:', APP_VERSION);
                        // Force an immediate hard reload with cache bypass
                        // Use location.reload(true) for maximum cache bypass (deprecated but still works)
                        if (window.location.reload) {
                            // Force reload from server, bypassing cache
                            window.location.reload(true);
                        } else {
                            // Fallback: redirect with cache-busting timestamp
                            var reloadUrl = window.location.href.split('?')[0] + '?noReload=1&_t=' + Date.now();
                            window.location.replace(reloadUrl);
                        }
                        return; // Exit early to prevent further execution
                    }
                } else {
                    // No cache clear needed, but update version if not set
                    if (!storedVersion) {
                        localStorage.setItem(VERSION_STORAGE_KEY, APP_VERSION);
                    }
                }
            } catch (e) {
                console.warn('Error in cache clearing script:', e);
            }
        })();
    </script>
    
    <!-- Build Version Check - Shows notification when new version is available -->
    <script>
        (function() {
            var BUILD_VERSION_KEY = 'abcotronics_build_version';
            var checkInterval = null;
            var notificationShown = false;
            
            function showUpdateNotification(summaryText) {
                if (notificationShown) return;
                notificationShown = true;
                
                // Create notification banner
                var banner = document.createElement('div');
                banner.id = 'build-version-notification';
                banner.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; padding: 16px 20px; z-index: 10000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;';
                
                var message = document.createElement('div');
                message.style.cssText = 'flex: 1; font-size: 14px; font-weight: 500; display: flex; flex-direction: column; gap: 6px; min-width: 0;';
                var mainLine = document.createElement('div');
                mainLine.textContent = 'A new version is available. Please refresh to get the latest updates.';
                message.appendChild(mainLine);
                if (summaryText && String(summaryText).trim()) {
                    var sub = document.createElement('div');
                    sub.style.cssText = 'font-size: 12px; font-weight: 400; opacity: 0.92; line-height: 1.35;';
                    sub.textContent = String(summaryText).trim();
                    message.appendChild(sub);
                }
                
                var buttonContainer = document.createElement('div');
                buttonContainer.style.cssText = 'display: flex; gap: 12px; align-items: center;';
                
                var refreshBtn = document.createElement('button');
                refreshBtn.textContent = 'Refresh Now';
                refreshBtn.style.cssText = 'background: white; color: #2563eb; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.2s;';
                refreshBtn.onmouseover = function() { this.style.transform = 'scale(1.05)'; this.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)'; };
                refreshBtn.onmouseout = function() { this.style.transform = 'scale(1)'; this.style.boxShadow = 'none'; };
                refreshBtn.onclick = function() {
                    localStorage.setItem(BUILD_VERSION_KEY, '');
                    window.location.reload(true);
                };
                
                var dismissBtn = document.createElement('button');
                dismissBtn.innerHTML = '✕';
                dismissBtn.style.cssText = 'background: transparent; color: white; border: none; padding: 4px 12px; cursor: pointer; font-size: 18px; font-weight: bold; opacity: 0.8; transition: opacity 0.2s;';
                dismissBtn.onmouseover = function() { this.style.opacity = '1'; };
                dismissBtn.onmouseout = function() { this.style.opacity = '0.8'; };
                dismissBtn.onclick = function() {
                    banner.style.display = 'none';
                    document.body.style.paddingTop = '';
                    notificationShown = false;
                };
                
                buttonContainer.appendChild(refreshBtn);
                buttonContainer.appendChild(dismissBtn);
                banner.appendChild(message);
                banner.appendChild(buttonContainer);
                document.body.appendChild(banner);
                
                // Add padding to body to prevent content shift
                document.body.style.paddingTop = '60px';
            }
            
            function checkBuildVersion() {
                try {
                    var controller = new AbortController();
                    var timeoutId = setTimeout(function() { controller.abort(); }, 8000);
                    fetch('/dist/build-version.json?v=' + Date.now(), { cache: 'no-store', signal: controller.signal })
                        .then(function(response) {
                            clearTimeout(timeoutId);
                            if (!response.ok) return;
                            return response.json();
                        })
                        .then(function(data) {
                            if (!data || !data.version) return;
                            
                            var currentVersion = data.version;
                            var storedVersion = localStorage.getItem(BUILD_VERSION_KEY);
                            
                            // If versions don't match and we haven't shown notification yet
                            if (storedVersion && storedVersion !== currentVersion && !notificationShown) {
                                showUpdateNotification(data.summary && String(data.summary).trim() ? data.summary : '');
                            } else if (!storedVersion) {
                                // First time - store the version
                                localStorage.setItem(BUILD_VERSION_KEY, currentVersion);
                            }
                        })
                        .catch(function() {
                            clearTimeout(timeoutId);
                            // Silently fail - network/unreachable already visible in DevTools
                        });
                } catch (e) {
                    // Silently fail
                }
            }
            
            // Check soon after DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    setTimeout(checkBuildVersion, 1000);
                });
            } else {
                setTimeout(checkBuildVersion, 1000);
            }
            
            // Check every 60 seconds
            checkInterval = setInterval(checkBuildVersion, 60000);
            
            // Re-check when user returns to the tab (catches deploy while tab was in background)
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible') {
                    checkBuildVersion();
                }
            });
            
            // Clean up on page unload
            window.addEventListener('beforeunload', function() {
                if (checkInterval) {
                    clearInterval(checkInterval);
                }
            });
        })();
    </script>

        // Global unhandled promise rejection handler (v3 - ultra-robust database error detection)

        window.addEventListener('unhandledrejection', function(event) {
            try {
                const error = event.reason;
                
                // Extract ALL possible error text sources
                let allErrorText = '';
                
                if (error instanceof Error) {
                    allErrorText = [
                        error.message || '',
                        error.name || '',
                        error.toString(),
                        error.stack || ''
                    ].join(' ').toLowerCase();
                } else if (typeof error === 'string') {
                    allErrorText = error.toLowerCase();
                } else if (error && typeof error === 'object') {
                    allErrorText = [
                        error.message || '',
                        error.error?.message || '',
                        error.reason?.message || '',
                        String(error),
                        JSON.stringify(error).substring(0, 500) // Limit to avoid huge strings
                    ].join(' ').toLowerCase();
                } else {
                    allErrorText = String(error).toLowerCase();
                }
                
                // Check for database connection errors - very broad pattern matching
                // Match ANY indication of database/connection/server issues
                const isDatabaseError = 
                    allErrorText.includes('database connection failed') ||
                    allErrorText.includes('database server is unreachable') ||
                    allErrorText.includes('database server') && allErrorText.includes('unreachable') ||
                    (allErrorText.includes('unreachable') && (allErrorText.includes('database') || allErrorText.includes('server'))) ||
                    allErrorText.includes('contact support if this issue persists') ||
                    allErrorText.includes('please contact support') ||
                    allErrorText.includes('contact support') ||
                    allErrorText.includes('econnrefused') ||
                    allErrorText.includes('connection refused') ||
                    allErrorText.includes('localhost refused to connect') ||
                    allErrorText.includes('err_connection_refused') ||
                    allErrorText.includes('etimedout') ||
                    allErrorText.includes('can\'t reach database') ||
                    allErrorText.includes('cannot reach database') ||
                    (allErrorText.includes('connection') && allErrorText.includes('failed') && allErrorText.includes('database')) ||
                    (allErrorText.includes('server') && allErrorText.includes('unreachable'));
                
                // When connection refused (server not running), show actionable hint once per session
                if ((allErrorText.includes('connection refused') || allErrorText.includes('localhost refused to connect') || allErrorText.includes('err_connection_refused') || allErrorText.includes('is the server running') || allErrorText.includes('econnrefused')) && !sessionStorage.getItem('connection_refused_hint_shown')) {
                    try {
                        sessionStorage.setItem('connection_refused_hint_shown', '1');
                        setTimeout(function () {
                            alert('Connection refused. Is the server running? Run: npm run dev:backend — then open http://localhost:3000 (or the port shown in the terminal).');
                        }, 500);
                    } catch (_) {}
                }
                
                // Check for opportunities API errors (500s) - these are server-side issues
                const isOpportunitiesApiError = 
                    allErrorText.includes('failed to list opportunities') ||
                    (allErrorText.includes('opportunities') && (allErrorText.includes('500') || allErrorText.includes('server error'))) ||
                    (allErrorText.includes('/opportunities') && (allErrorText.includes('500') || allErrorText.includes('internal server error')));
                
                // Check for projects API errors (500s) - these are server-side issues
                const isProjectsApiError = 
                    allErrorText.includes('failed to get project') ||
                    allErrorText.includes('failed to fetch project') ||
                    (allErrorText.includes('projects') && (allErrorText.includes('500') || allErrorText.includes('server error'))) ||
                    (allErrorText.includes('/projects/') && (allErrorText.includes('500') || allErrorText.includes('internal server error')));
                
                // Check for server errors (5xx) - Bad Gateway, Service Unavailable, Gateway Timeout, etc.
                // These are server-side issues that the client can't fix, so suppress them
                const hasStatus500 = error && typeof error === 'object' && (error.status === 500 || error.code === 500);
                const isServerError = 
                    hasStatus500 ||
                    allErrorText.includes('502') ||
                    allErrorText.includes('503') ||
                    allErrorText.includes('504') ||
                    allErrorText.includes('500') ||
                    allErrorText.includes('bad gateway') ||
                    allErrorText.includes('service unavailable') ||
                    allErrorText.includes('gateway timeout') ||
                    allErrorText.includes('internal server error') ||
                    (allErrorText.includes('server') && (allErrorText.includes('unavailable') || allErrorText.includes('error')));
                
                // Check for "already exists" errors - these are handled gracefully by the application
                const isAlreadyExistsError = 
                    allErrorText.includes('already exist') ||
                    allErrorText.includes('already exists') ||
                    (allErrorText.includes('duplicate') && (allErrorText.includes('weekly') || allErrorText.includes('notes')));
                
                // Check for "Not found" / 404 errors - these are expected when resources don't exist
                // (e.g., deleted clients/leads, non-existent entities)
                const isNotFoundError = 
                    allErrorText.includes('not found') ||
                    allErrorText.includes('404') ||
                    (error instanceof Error && error.message && error.message.includes('Not found')) ||
                    (error && typeof error === 'object' && (error.status === 404 || error.code === 404));
                
                // Check for rate limit (429) - expected when server throttles; app already shows "wait" and retries
                const isRateLimitError = 
                    allErrorText.includes('429') ||
                    allErrorText.includes('too many requests') ||
                    allErrorText.includes('rate limit') ||
                    (error && typeof error === 'object' && (error.status === 429 || error.code === 'RATE_LIMIT_EXCEEDED'));
                
                // Check for auth (401) - expected when session expired or not logged in (e.g. /api/notifications)
                const isAuthError = 
                    allErrorText.includes('401') ||
                    allErrorText.includes('unauthorized') ||
                    (error && typeof error === 'object' && (error.status === 401 || error.code === 401));
                
                // Only log non-database, non-opportunities-api, non-projects-api, non-server, non-already-exists, non-not-found, non-rate-limit, and non-auth errors
                if (!isDatabaseError && !isOpportunitiesApiError && !isProjectsApiError && !isServerError && !isAlreadyExistsError && !isNotFoundError && !isRateLimitError && !isAuthError) {
                    console.error('🚨 Unhandled Promise Rejection:', {

    <!-- Version polling logic: Best practice implementation for SPA version updates -->
    <!-- Checks /version endpoint periodically and on visibility changes (when user returns to tab) -->
    <script>
        (function() {
            const VERSION_STORAGE_KEY = 'abcotronics_app_version';
            const VERSION_CHECK_INTERVAL_MS = 60 * 1000; // 60 seconds - industry standard
            const VERSION_ENDPOINT = '/version';
            let versionCheckTimer = null;
            let lastCheckTime = 0;
            const MIN_CHECK_INTERVAL = 15 * 1000; // Throttle: max once per 15 seconds

            function getStoredVersion() {
                try {
                    return localStorage.getItem(VERSION_STORAGE_KEY) || null;
                } catch {
                    return null;
                }
            }

            function setStoredVersion(version) {
                try {
                    if (version) {
                        localStorage.setItem(VERSION_STORAGE_KEY, version);
                    }
                } catch {
                    // Ignore storage errors (private mode, etc.)
                }
            }

            async function fetchCurrentVersion() {
                var controller = new AbortController();
                var timeoutId = setTimeout(function() { controller.abort(); }, 8000);
                try {
                    const res = await fetch(VERSION_ENDPOINT, {
                        cache: 'no-store',
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' },
                    });
                    clearTimeout(timeoutId);
                    if (!res.ok) return null;
                    const contentType = res.headers.get('content-type');
                    if (!contentType || !contentType.includes('application/json')) {
                        // Try to parse as JSON anyway
                    }
                    const data = await res.json().catch(function() { return null; });
                    if (!data || data.version == null || data.version === '') return null;
                    return {
                        version: String(data.version),
                        summary: typeof data.summary === 'string' ? data.summary.trim() : ''
                    };
                } catch (err) {
                    clearTimeout(timeoutId);
                    // Network errors (ERR_ADDRESS_UNREACHABLE, timeout) - fail silently
                    return null;
                }
            }

            function showBanner(releaseSummary) {
                const banner = document.getElementById('app-version-banner');
                if (!banner) return;
                banner.style.display = 'block';

                const summaryEl = document.getElementById('app-version-banner-summary');
                if (summaryEl) {
                    if (releaseSummary && String(releaseSummary).trim()) {
                        summaryEl.textContent = String(releaseSummary).trim();
                        summaryEl.removeAttribute('hidden');
                    } else {
                        summaryEl.textContent = '';
                        summaryEl.setAttribute('hidden', 'hidden');
                    }
                }

                const reloadBtn = document.getElementById('app-version-reload');
                const dismissBtn = document.getElementById('app-version-dismiss');

                if (reloadBtn) {
                    reloadBtn.onclick = function() {
                        // Normal reload is enough because HTML is served with no-cache headers
                        window.location.reload();
                    };
                }

                if (dismissBtn) {
                    dismissBtn.onclick = function() {
                        banner.style.display = 'none';
                        // Dismiss is temporary; the banner should reappear while mismatch remains.
                    };
                }
            }

            async function checkVersion(forceShow = false) {
                // Throttle checks to avoid excessive server requests
                const now = Date.now();
                if (!forceShow && (now - lastCheckTime) < MIN_CHECK_INTERVAL) {
                    return;
                }
                lastCheckTime = now;

                const latest = await fetchCurrentVersion();
                if (!latest) {
                    // Network unreachable / timeout - fail silently (browser already logs failed request)
                    return;
                }

                const stored = getStoredVersion();
                const latestVersion = latest.version;
                const summary = latest.summary || '';

                // Only log when something actionable happens (reduces console noise)
                var versionDebug = typeof localStorage !== 'undefined' && localStorage.getItem('DEBUG_VERSION_CHECK') === 'true';

                if (stored && stored !== latestVersion) {
                    console.log('✅ New version detected!', { old: stored, new: latestVersion, summary: summary || undefined });
                    console.log('📢 Showing update notification banner');
                    showBanner(summary);
                } else if (!stored) {
                    if (versionDebug) console.log('📦 First version check - storing version:', latestVersion);
                } else if (versionDebug) {
                    console.log('🔍 Version unchanged:', latestVersion);
                }

                // Always update stored version
                setStoredVersion(latestVersion);
            }

            function startPeriodicChecks() {
                if (versionCheckTimer) {
                    clearInterval(versionCheckTimer);
                }
                versionCheckTimer = setInterval(() => {
                    checkVersion();
                }, VERSION_CHECK_INTERVAL_MS);
            }

            async function initializeVersionWatcher() {
                // Prevent multiple initializations
                if (window._versionWatcherInitialized) {
                    return;
                }
                window._versionWatcherInitialized = true;
                
                // Initial check on page load
                await checkVersion(true);

                // Start periodic polling (industry standard: 60-300 seconds)
                startPeriodicChecks();

                // BEST PRACTICE: Check when tab becomes visible (user returns to app)
                // This is more reliable than 'focus' event and works better with mobile
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        // Tab became visible - check for updates
                        checkVersion();
                    }
                });

                // BEST PRACTICE: Also check on window focus as fallback
                window.addEventListener('focus', () => {
                    checkVersion();
                }, { passive: true });

                // Expose manual check function for debugging/admin use
                window.checkAppVersion = () => checkVersion(true);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializeVersionWatcher);
            } else {
                initializeVersionWatcher();
            }
        })();
    </script>
