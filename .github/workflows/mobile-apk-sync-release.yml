# Sync the latest GitHub Release APK asset to production downloads (no local SSH).
# 1) Publish APK:  npm run mobile:apk:release
# 2) Sync server:  npm run mobile:apk:sync

name: Mobile APK sync from release

on:
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'gemauck/Aureus-2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download mobile-latest -R gemauck/Aureus-2 -D . -p '*.apk'
          ls -lh Abcotronics-ERP-Mobile.apk

      - name: Upload to production downloads
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER != '' && secrets.DROPLET_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: Abcotronics-ERP-Mobile.apk
          target: /var/www/abcotronics-erp/public/downloads/
          overwrite: true

      - name: Verify on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER != '' && secrets.DROPLET_USER || 'root' }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            ls -lh /var/www/abcotronics-erp/public/downloads/Abcotronics-ERP-Mobile.apk
            file /var/www/abcotronics-erp/public/downloads/Abcotronics-ERP-Mobile.apk
