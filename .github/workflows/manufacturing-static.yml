# Static checks for manufacturing / stock / ledger tooling (no DB required).
# Full ledger verification: run locally or in deploy with DATABASE_URL — see package.json verify:ledger*
# Full forensic E2E: npm run audit:forensic:movements:e2e:full (needs TEST_* and running app).
# Full mega audit (API + UI + ledger): npm run audit:manufacturing:mega — local/staging only; not run in this workflow.

name: Manufacturing static

on:
  pull_request:
    paths:
      - 'api/manufacturing.js'
      - 'api/sales-orders.js'
      - 'api/purchase-orders.js'
      - 'api/jobcards.js'
      - 'api/_lib/**'
      - 'eslint-rules/**'
      - 'scripts/forensic-*.mjs'
      - 'scripts/manufacturing-mega-audit.mjs'
      - 'scripts/test-all-stock-movements.mjs'
      - 'scripts/verify-ledger*.js'
      - 'scripts/align-location-inventory-to-movements.mjs'
      - 'src/components/manufacturing/**'
      - 'build-jsx.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/manufacturing-static.yml'
  push:
    branches: [main, master]
    paths:
      - 'api/manufacturing.js'
      - 'api/sales-orders.js'
      - 'api/purchase-orders.js'
      - 'api/jobcards.js'
      - 'api/_lib/**'
      - 'eslint-rules/**'
      - 'scripts/forensic-*.mjs'
      - 'scripts/manufacturing-mega-audit.mjs'
      - 'scripts/test-all-stock-movements.mjs'
      - 'scripts/verify-ledger*.js'
      - 'scripts/align-location-inventory-to-movements.mjs'
      - 'src/components/manufacturing/**'
      - 'build-jsx.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/manufacturing-static.yml'

jobs:
  manufacturing-static:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint manufacturing audit rules
        run: npm run lint:audit

      - name: Syntax-check movement audit scripts
        run: npm run audit:manufacturing:static

      - name: Build JSX (Manufacturing bundle must compile)
        run: npm run build:jsx
