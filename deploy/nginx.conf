# Nginx configuration for Abcotronics ERP
# Place this file at: /etc/nginx/sites-available/abcotronics-erp

upstream abcotronics_backend {
    # Single port: PM2 cluster mode shares one listen port (e.g. 3000). Do NOT add 127.0.0.1:3001
    # unless a second process actually listens there — otherwise nginx round-robins to a dead upstream → 502.
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    
    # Let's Encrypt SSL challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.com www.your-domain.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/abcotronics-erp.access.log;
    error_log /var/log/nginx/abcotronics-erp.error.log;

    # Root directory for static files
    root /var/www/abcotronics-erp;
    index index.html;

    # Increase body size for file uploads
    client_max_body_size 50M;

    # Ensure the SPA shell is always fresh
    # Browsers will always revalidate index.html so users see the latest deployment
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # JSON /version from Node (no static file on disk — without this, try_files would serve index.html)
    location = /version {
        proxy_pass http://abcotronics_backend/version;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Serve built static assets from disk (don't proxy to Node — reduces 502 under load)
    # MUST be before "location /" so these paths are not caught by try_files
    location /dist/ {
        alias /var/www/abcotronics-erp/dist/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Vite Projects module - serve from disk (avoids 502 when proxying to Node)
    # Files from: npm run build:vite-projects -> dist/vite-projects/
    # MUST be before "location /" so /vite-projects/* is not served as index.html
    location /vite-projects/ {
        alias /var/www/abcotronics-erp/dist/vite-projects/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve static files (catch-all; /dist/ and /vite-projects/ take precedence above)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API proxy
    # Whisper transcription and some CRM calls can exceed 60s; short proxy_read_timeout → nginx 502 while Node is still waiting.
    location /api/ {
        proxy_pass http://abcotronics_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # WebSocket support (if needed)
    location /ws {
        proxy_pass http://abcotronics_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://abcotronics_backend/health;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
